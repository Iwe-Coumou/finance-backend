services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: finance_db
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: finance123
      POSTGRES_DB: finance  
    ports:
      - "5433:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/finance_db_data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: finance_redis
    ports:
      - "6380:6379"
    volumes:
      - finance_redis_data:/data 
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest 
    container_name: finance_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - timescaledb
    restart: unless-stopped

volumes:
  finance_db_data:
  finance_redis_data:
  grafana_data:
