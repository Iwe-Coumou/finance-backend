services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: finance_db
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: finance123
      POSTGRES_DB: finance  
    ports:
      - "5433:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/finance_db_data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: finance_redis
    ports:
      - "6380:6379"
    volumes:
      - finance_redis_data:/data 
    restart: unless-stopped

  api:
    build: .
    container_name: finance_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_URL=postgresql://postgres:finance123@timescaledb:5432/finance
      - REDIS_URL=redis://redis:6379
    depends_on:
      - timescaledb
      - redis
    restart: unless-stopped

volumes:
  finance_db_data:
  finance_redis_data: